<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>ログイン</title>
    <link rel="stylesheet" th:href="@{/css/common.css}">
    <style>
        main {
            min-height: calc(100vh - 120px - 40px);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px 16px;
        }

        .page-title {
            margin: 0 0 32px;
            font-size: 36px;
            font-weight: 400;
            line-height: 1.33;
            text-align: center;
            color: rgba(0, 0, 0, 0.75);
        }

        .form-container {
            width: 100%;
            max-width: 480px;
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        .form-group {
            width: 100%;
        }

        label {
            display: block;
            margin-bottom: 3px;
            font-size: 12px;
            color: rgba(0, 0, 0, 0.54);
            font-weight: 400;
        }

        input {
            width: 100%;
            height: 48px;
            padding: 16px 0 8px;
            border: none;
            border-bottom: 1px solid rgba(0, 0, 0, 0.42);
            border-radius: 0;
            background: transparent;
            font-size: 16px;
            color: rgba(0, 0, 0, 0.87);
        }

        input:focus {
            outline: none;
            border-bottom: 2px solid #000000;
        }

        .error {
            margin-top: 6px;
            color: #d92d20;
            font-size: 13px;
            line-height: 1.4;
        }

        .primary-button {
            width: 232px;
            height: 53px;
            margin: 8px auto 0;
            border: none;
            background: #1b5678;
            color: #ffffff;
            border-radius: 4px;
            font-size: 18px;
            line-height: 21px;
            cursor: pointer;
        }

        .register-link {
            margin-top: 12px;
            text-align: center;
        }

        .register-link a {
            color: #1b5678;
            text-decoration: none;
            font-weight: 500;
        }
    </style>
</head>
<body>
<div th:replace="~{fragments/layout :: siteHeader}"></div>

<main>
    <h1 class="page-title">ログイン</h1>

    <form class="form-container" th:action="@{/login}" th:object="${form}" method="post">
        <div class="error" th:if="${loginError}" th:text="${loginError}"></div>

        <div class="form-group">
            <label for="email">メールアドレス</label>
            <input id="email" type="email" th:field="*{email}" required>
        </div>

        <div class="form-group">
            <label for="password">パスワード</label>
            <input id="password" type="password" th:field="*{password}" required>
        </div>

        <button class="primary-button" type="submit">ログイン</button>

        <p class="register-link">
            <a th:href="@{/register}">新規登録する</a>
        </p>
    </form>
</main>

<div th:replace="~{fragments/layout :: siteFooter}"></div>
</body>
</html>
