<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<body>
    <header th:fragment="siteHeader" class="site-header">
        <a th:if="${headerNav != null and headerNav.name() == 'LOGOUT'}" th:href="@{/top}" class="site-title site-title-link">My Portfolio</a>
        <h1 th:unless="${headerNav != null and headerNav.name() == 'LOGOUT'}" class="site-title">My Portfolio</h1>
        <nav class="site-header-actions" th:if="${headerNav != null}">
            <th:block th:if="${headerNav.name() == 'LOGIN'}">
                <a th:href="@{/login}" class="header-login-btn">ログイン</a>
            </th:block>
            <th:block th:if="${headerNav.name() == 'LOGOUT'}">
                <form th:action="@{/logout}" method="post" class="header-logout-form">
                    <button type="submit" class="header-logout-btn">ログアウト</button>
                </form>
            </th:block>
        </nav>
    </header>

<footer th:fragment="siteFooter" class="site-footer">
    <p>portfolio site</p>
</footer>
</body>
</html>
