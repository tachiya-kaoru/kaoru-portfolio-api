<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TOP</title>
    <link rel="stylesheet" th:href="@{/css/common.css}">
    <style>
        .top-page {
            width: 100%;
            max-width: 960px;
            margin: 0 auto;
            padding: 80px 16px 48px;
            box-sizing: border-box;
        }

        .top-profile {
            display: flex;
            flex-wrap: wrap;
            gap: 40px;
            align-items: flex-start;
            margin-bottom: 80px;
        }

        .top-profile__avatar-wrap {
            flex: 0 0 auto;
        }

        .top-avatar-img {
            display: block;
            width: 360px;
            max-width: 100%;
            height: auto;
            aspect-ratio: 1 / 1;
            object-fit: cover;
            border-radius: 50%;
        }

        .top-avatar-placeholder {
            width: 360px;
            max-width: 100%;
            aspect-ratio: 1 / 1;
            background: #C4C4C4;
            border: none;
            border-radius: 50%;
            box-sizing: border-box;
        }

        .top-profile__name {
            margin: 12px 0 0;
            font-size: 20px;
            line-height: 1.2;
            color: #000;
            text-align: center;
        }

        .top-profile__content {
            flex: 1 1 280px;
            min-width: 0;
        }

        .top-section-title {
            margin: 0 0 16px;
            font-size: 36px;
            font-weight: 700;
            line-height: 42px;
            color: rgba(0, 0, 0, 0.75);
        }

        .top-section-rule {
            height: 0;
            border: none;
            border-top: 2px solid rgba(0, 0, 0, 0.5);
            margin: 0 0 24px;
        }
        .top-intro-body {
            margin: 0 0 24px;
            font-size: 18px;
            line-height: 1.5;
            color: rgba(0, 0, 0, 0.75);
            white-space: pre-line;
            overflow-wrap: break-word;
        }

        .top-btn-primary {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-height: 53px;
            padding: 16px 40px;
            border: none;
            border-radius: 4px;
            background: #1b5678;
            color: #fff;
            font-size: 18px;
            font: inherit;
            cursor: pointer;
            text-decoration: none;
        }

        .top-chart {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 40px;
        }

        .top-chart-head {
            width: 100%;
            max-width: 400px;
        }

        .top-chart-head .top-section-title {
            text-align: center;
        }

        .top-chart-frame {
            width: 100%;
            max-width: 960px;
            min-height: 400px;
            padding: 24px 16px;
            box-sizing: border-box;
            background: #fff;
        }

        #learningChart {
            width: 100%;
            min-height: 360px;
        }

        @media (max-width: 768px) {
            .top-page {
                padding: 40px 16px 32px;
            }

            .top-profile {
                flex-direction: column;
                align-items: center;
                text-align: center;
            }

            .top-profile__avatar-wrap {
                display: flex;
                flex-direction: column;
                align-items: center;
                width: 100%;
            }

            .top-profile__content {
                flex: none;
                width: 100%;
            }

            .top-avatar-img,
            .top-avatar-placeholder {
                width: 100%;
                max-width: 320px;
                margin: 0 auto;
            }

            .top-profile__name {
                text-align: center;
            }

            .top-section-title {
                font-size: 28px;
                line-height: 1.2;
            }
        }
    </style>
</head>
<body>
<div th:replace="~{fragments/layout :: siteHeader}"></div>

<main class="top-page">
    <section class="top-profile" aria-label="プロフィール">
        <div class="top-profile__avatar-wrap">
            <img th:if="${user.avatarImageUrl != null and !#strings.isEmpty(user.avatarImageUrl)}"
                 th:src="${user.avatarImageUrl}"
                 alt=""
                 class="top-avatar-img">
            <div th:unless="${user.avatarImageUrl != null and !#strings.isEmpty(user.avatarImageUrl)}"
                 class="top-avatar-placeholder"
                 role="img"
                 aria-label="画像未設定"></div>
            <p class="top-profile__name" th:text="${user.name}">氏名</p>
        </div>
        <div class="top-profile__content">
            <h2 class="top-section-title">自己紹介</h2>
            <hr class="top-section-rule">
            <p class="top-intro-body"
               th:if="${user.introduction != null and !#strings.isEmpty(user.introduction)}"
               th:text="${user.introduction}">自己紹介文</p>
            <p class="top-intro-body" th:unless="${user.introduction != null and !#strings.isEmpty(user.introduction)}">未設定</p>
            <a th:href="@{/profile/edit}" class="top-btn-primary">自己紹介を編集する</a>
        </div>
    </section>

    <section class="top-chart" aria-label="学習チャート">
        <div class="top-chart-head">
            <h2 class="top-section-title">学習チャート</h2>
            <hr class="top-section-rule">
        </div>
        <a th:href="@{/skill/edit}" class="top-btn-primary">編集する</a>
        <div class="top-chart-frame">
            <div id="learningChart"></div>
        </div>
    </section>
</main>

<div th:replace="~{fragments/layout :: siteFooter}"></div>

<script src="https://cdn.jsdelivr.net/npm/apexcharts"></script>
<script th:inline="javascript">
    (function () {
        var monthLabels = /*[[${chartMonthLabels}]]*/ [];
        var categoryNames = /*[[${chartCategoryNames}]]*/ [];
        var seriesData = /*[[${chartSeriesData}]]*/ [];

        // Figma に近い色（バックエンド / フロントエンド / インフラ）
        var colors = ['#F4A6C8', '#F5C16C', '#F5E6A3'];

        var series = [];
        for (var i = 0; i < categoryNames.length; i++) {
            series.push({
                name: categoryNames[i],
                data: seriesData[i] || [0, 0, 0]
            });
        }

        var options = {
            chart: {
                type: 'bar',
                height: 360,
                toolbar: { show: false }
            },
            series: series,
            colors: colors,
            plotOptions: {
                bar: {
                    horizontal: false,
                    columnWidth: '55%',
                    borderRadius: 2
                }
            },
            dataLabels: { enabled: false },
            stroke: {
                show: true,
                width: 2,
                colors: ['transparent']
            },
            xaxis: {
                categories: monthLabels
            },
            yaxis: {
                title: { text: '学習時間（分）' },
                min: 0
                // max は固定しない → 上限なしでデータに合わせて伸びる
            },
            legend: {
                position: 'top',
                horizontalAlign: 'center'
            },
            fill: { opacity: 1 },
            tooltip: {
                y: {
                    formatter: function (val) {
                        return val + ' 分';
                    }
                }
            }
        };

        var chart = new ApexCharts(document.querySelector('#learningChart'), options);
        chart.render();
    })();
</script>
</body>
</html>
