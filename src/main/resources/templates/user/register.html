<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>新規登録</title>
    <style>
         body { font-family: sans-serif; margin: 24px; }
        .form-group { margin-bottom: 16px; }
        label { display: block; margin-bottom: 6px; font-weight: bold; }
        input { width: 320px; padding: 8px; }
        .error { color: #d00; font-size: 0.9rem; margin-top: 4px; }
        button { padding: 8px 16px; }
    </style>
</head>
<body>
    <main>
      <h1>新規登録</h1>
      <form th:action="@{/register}" th:object="${form}" method="post" novalidate>
        <div class="form-group">
          <label for="name">氏名</label>
          <input id="name" type="text" th:field="*{name}" >
        <div class="error" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></div>
        </div>
  
        <div class="form-group">
          <label for="email">メールアドレス</label>
          <input id="email" type="email" th:field="*{email}" >
          <div class="error" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></div>
        </div>
  
        <div class="form-group">
          <label for="password">パスワード</label>
          <input id="password" type="password" th:field="*{password}" >
          <div class="error" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></div>
        </div>
  
        <button type="submit">登録する</button>
      </form>
    </main>
  </body>
</html>
