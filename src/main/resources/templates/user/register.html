<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>新規登録</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: Roboto, "Helvetica Neue", Arial, sans-serif;
            color: #222;
            background: #fff;
        }

        main {
            min-height: calc(100vh - 120px - 80px); /* header/footerの想定分を引く */
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 64px 16px;
        }

        .page-title {
            margin: 0 0 64px;
            font-size: 36px;
            font-weight: 400;
            line-height: 1.33;
            text-align: center;
            color: rgba(0,0,0,0.75);
        }

        .form-container {
            width: 100%;
            max-width: 480px;
            display: flex;
            flex-direction: column;
            align-items: stretch;
            gap: 48px;
        }

        .form-group {
            width: 100%;
        }

        label {
            display: block;
            margin-bottom: 3px;
            font-size: 12px;
            color: rgba(0, 0, 0, 0.54);
            font-weight: 400;
        }

        input {
            width: 100%;
            height: 48px;
            padding: 16px 0 8px;
            border: none;
            border-bottom: 1px solid rgba(0, 0, 0, 0.42);
            border-radius: 0;
            background: transparent;
            font-size: 16px;
            color: rgba(0, 0, 0, 0.87);
        }

        input:focus {
            outline: none;
            border-bottom: 2px solid #000000;
        }

        .error {
            margin-top: 6px;
            color: #d92d20;
            font-size: 13px;
            line-height: 1.4;
        }

        .submit-button {
            width: 232px;
            height: 53px;
            margin: 0 auto;
            border: none;
            background: #1b5678;
            color: #ffffff;
            border-radius: 4px;
            font-size: 18px;
            line-height: 21px;
            cursor: pointer;
        }

        .submit-button:hover {
            opacity: 0.92;
        }

        @media (max-width: 768px) {
            main {
                padding: 40px 16px;
            }

            .page-title {
                margin-bottom: 40px;
                font-size: 28px;
            }
        }
    </style>
</head>
<body>
    <main>
        <h1 class="page-title">新規登録</h1>
        <form class="form-container" th:action="@{/register}" th:object="${form}" method="post" novalidate>
            <div class="form-group">
                <label for="name">氏名</label>
                <input id="name" type="text" th:field="*{name}">
                <div class="error" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></div>
            </div>

            <div class="form-group">
                <label for="email">メールアドレス</label>
                <input id="email" type="email" th:field="*{email}">
                <div class="error" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></div>
            </div>

            <div class="form-group">
                <label for="password">パスワード</label>
                <input id="password" type="password" th:field="*{password}">
                <div class="error" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></div>
            </div>

            <button class="submit-button" type="submit">登録する</button>
        </form>
    </main>
</body>
</html>
