<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>自己紹介の編集</title>
    <link rel="stylesheet" th:href="@{/css/common.css}">
    <style>
        main {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            padding: 80px 16px 56px;
        }

        .page-title {
            margin: 0 0 48px;
            font-size: 36px;
            font-weight: 400;
            line-height: 1.33;
            text-align: center;
            color: rgba(0, 0, 0, 0.75);
        }

        .form-container {
            width: 100%;
            max-width: 480px;
            display: flex;
            flex-direction: column;
            align-items: stretch;
            gap: 24px;
        }

        .form-group {
            width: 100%;
        }

        label {
            display: block;
            margin-bottom: 3px;
            font-size: 12px;
            color: rgba(0, 0, 0, 0.54);
            font-weight: 400;
        }

        textarea {
            width: 100%;
            min-height: 160px;
            padding: 12px 0 8px;
            border: none;
            border-bottom: 1px solid rgba(0, 0, 0, 0.42);
            border-radius: 0;
            background: transparent;
            font-size: 16px;
            line-height: 1.5;
            color: rgba(0, 0, 0, 0.87);
            resize: vertical;
            font-family: inherit;
        }

        textarea:focus {
            outline: none;
            border-bottom: 2px solid #000000;
        }

        input[type="file"] {
            width: 100%;
            font-size: 14px;
            color: rgba(0, 0, 0, 0.87);
        }

        .selected-file-name {
            margin-top: 6px;
            font-size: 13px;
            color: rgba(0, 0, 0, 0.75);
        }

        .error {
            margin-top: 6px;
            color: #d92d20;
            font-size: 13px;
            line-height: 1.4;
        }

        .submit-button {
            width: 232px;
            height: 53px;
            margin: 8px auto 0;
            border: none;
            background: #1b5678;
            color: #ffffff;
            border-radius: 4px;
            font-size: 18px;
            line-height: 21px;
            cursor: pointer;
        }

        .submit-button:hover {
            opacity: 0.92;
        }

        @media (max-width: 768px) {
            main {
                padding: 40px 16px;
            }

            .page-title {
                margin-bottom: 40px;
                font-size: 28px;
            }
        }
    </style>
</head>
<body>
<div th:replace="~{fragments/layout :: siteHeader}"></div>

<main>
    <h1 class="page-title">自己紹介の編集</h1>

    <form class="form-container"
          th:action="@{/profile/edit}"
          th:object="${form}"
          method="post"
          enctype="multipart/form-data"
          novalidate>
        <div class="form-group">
            <label for="introduction">自己紹介</label>
            <textarea id="introduction" th:field="*{introduction}"></textarea>
            <div class="error" th:if="${#fields.hasErrors('introduction')}" th:errors="*{introduction}"></div>
        </div>

        <div class="form-group">
            <label for="avatarImage">アバター画像</label>
            <input id="avatarImage" type="file" name="avatarImage" accept="image/*">
            <p class="selected-file-name" id="selectedFileName" hidden></p>
        </div>

        <button class="submit-button" type="submit">自己紹介を確定する</button>
    </form>
</main>

<div th:replace="~{fragments/layout :: siteFooter}"></div>
</body>
</html>
