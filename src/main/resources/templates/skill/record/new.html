<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>項目を追加する</title>
</head>
<body>
<div th:replace="~{fragments/layout :: siteHeader}"></div>

<main>
    <h1 th:text="'【' + ${category.categoryName} + '】 ' + ${selectedMonth.label} + ' の項目を追加'">項目を追加</h1>

    <form th:action="@{/skill/records/new(month=${selectedMonth.value}, categoryId=${category.id})}"
          th:object="${form}"
          method="post"
          novalidate>

        <div>
            <label for="itemName">項目名</label>
            <input id="itemName" type="text" th:field="*{itemName}">
            <div th:if="${#fields.hasErrors('itemName')}" th:errors="*{itemName}"></div>
        </div>

        <div>
            <label for="learningTimeMinutes">学習時間（分）</label>
            <input id="learningTimeMinutes" type="number" min="0" th:field="*{learningTimeMinutes}">
            <div th:if="${#fields.hasErrors('learningTimeMinutes')}" th:errors="*{learningTimeMinutes}"></div>
        </div>

        <button type="submit">登録する</button>
    </form>
</main>

<div th:replace="~{fragments/layout :: siteFooter}"></div>
</body>
</html>
