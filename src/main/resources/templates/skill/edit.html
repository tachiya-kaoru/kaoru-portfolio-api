<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>学習内容の編集</title>
    <link rel="stylesheet" th:href="@{/css/common.css}">
    <style>
        .skill-edit-page {
            width: 100%;
            max-width: 960px;
            margin: 0 auto;
            padding: 80px 16px 48px;
            box-sizing: border-box;
        }

        .page-title {
            margin: 0 0 40px;
            font-size: 36px;
            font-weight: 400;
            line-height: 1.33;
            text-align: center;
            color: rgba(0, 0, 0, 0.75);
        }

        .month-field {
            margin-bottom: 48px;
        }

        .month-field label {
            display: block;
            margin-bottom: 8px;
            font-size: 12px;
            color: rgba(0, 0, 0, 0.54);
        }

        .month-field select {
            padding: 8px 16px;
            font-size: 24px;
            font-weight: 700;
            font-family: inherit;
            height: 44px;
            background: #fff;
            border: 1px solid #dddddd;
            border-radius: 4px;
            cursor: pointer;
        }

        /* カテゴリ全体：枠線で囲む */
        .skill-category {
            margin-bottom: 40px;
            padding: 40px;
            border: 1px solid rgba(0, 0, 0, 0.5);
            border-radius: 8px;
            box-sizing: border-box;
        }

        /* カテゴリタイトル行（名前＋ボタン横並び） */
        .skill-category-head {
            display: flex;
            flex-wrap: wrap;
            align-items: flex-start;
            justify-content: space-between;
            gap: 16px;
            margin-bottom: 32px;
        }

        /* カテゴリ名＋下線のセット */
        .skill-category-title-wrap {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .skill-category-title {
            margin: 0;
            font-size: 24px;
            font-weight: 700;
            line-height: 1.2;
            color: rgba(0, 0, 0, 0.75);
        }

        /* カテゴリ名の下線 */
        .skill-category-title-line {
            width: 240px;
            height: 0;
            border: none;
            border-top: 2px solid rgba(0, 0, 0, 0.5);
            margin: 0;
        }

        /* 「項目を追加」ボタン（disabled） */
        .skill-btn-primary {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            height: 48px;
            padding: 16px 40px;
            border: none;
            border-radius: 4px;
            background: #1b5678;
            color: #fff;
            font-size: 14px;
            font-family: inherit;
            
        }

        /* テーブルをカード風に */
        .skill-table-card {
            background: #fff;
            border-radius: 4px;
            box-shadow: 0px 3px 1px -2px rgba(0, 0, 0, 0.2),
                        0px 2px 2px rgba(0, 0, 0, 0.14),
                        0px 1px 5px rgba(0, 0, 0, 0.12);
            
        }

        .skill-table {
            width: 100%;
            border-collapse: collapse;
        }

        .skill-table th,
        .skill-table td {
            padding: 16px 16px;
            text-align: left;
            border-bottom: 1px solid #e0e0e0;
            font-size: 14px;
            color: rgba(0, 0, 0, 0.87);
        }

        .skill-table th:first-child,
        .skill-table td:first-child {
            padding-left: 40px;
        }

        .skill-table th {
            font-weight: 500;
            background: #fff;
        }

        .skill-empty {
            margin: 0;
            padding: 16px 16px 16px 40px;
            font-size: 14px;
            color: rgba(0, 0, 0, 0.54);
        }

        /* 1行の中：入力欄とボタンを横並び */
        .skill-time-form {
            display: flex;
            align-items: center;
            justify-content: flex-end;
            gap: 16px;
            flex-wrap: wrap;  /* 狭い画面では折り返し */
        }

        /* 学習時間入力欄（Figma: 160×40） */
        .skill-time-input {
            width: 160px;
            height: 40px;
            padding: 0 12px;
            border: 1px solid rgba(0, 0, 0, 0.23);
            border-radius: 4px;
            font-size: 14px;
            font-family: inherit;
            box-sizing: border-box;
        }

        /* 「学習時間を保存する」ボタン（アウトライン） */
        .btn-outline-primary {
            padding: 8px 16px;
            background: #FFFFFF;
            border: 1px solid #1B5678;
            border-radius: 4px;
            color: #1B5678;
            font-size: 14px;
            font-family: inherit;
            cursor: pointer;
            white-space: nowrap;
        }
        /* common.css の 70% を上書き */
        .skill-edit-page .skill-table th:first-child,
        .skill-edit-page .skill-table td:first-child {
            width: 28%;
        }

        .skill-edit-page .skill-table th:nth-child(2),
        .skill-edit-page .skill-table td:nth-child(2) {
            width: 22%;
        }

        .skill-edit-page .skill-table th:nth-child(3),
        .skill-edit-page .skill-table td:nth-child(3) {
            width: 50%;
            text-align: right;
            padding-right: 40px;
        }

        @media (max-width: 768px) {
            .skill-edit-page {
                padding: 40px 16px 32px;
            }

            .page-title {
                font-size: 28px;
                margin-bottom: 32px;
            }

            .skill-category {
                padding: 24px 16px;
            }

            .skill-category-title {
                font-size: 20px;
            }

            .skill-category-title-line {
                width: 100%;
            }
        }
    </style>
</head>
<body>
<div th:replace="~{fragments/layout :: siteHeader}"></div>

<main class="skill-edit-page">
    <h1 class="page-title">学習内容の編集</h1>
    
    <div class="month-field">
        <label for="monthSelect">対象月</label>
        <select id="monthSelect" name="month" aria-label="対象月">
            <option th:each="opt : ${monthOptions}"
                    th:value="${opt.value}"
                    th:text="${opt.label}"
                    th:selected="${opt.value == selectedMonth.value}">
            </option>
        </select>
    </div>

    <section class="skill-category"
             th:each="category : ${categories}"
             th:attr="aria-label=${category.categoryName}">
             <div class="skill-category-head">
                <div class="skill-category-title-wrap">
                    <h2 class="skill-category-title" th:text="${category.categoryName}">カテゴリ</h2>
                    <hr class="skill-category-title-line">
                </div>
                <a th:href="@{/skill/records/new(month=${selectedMonth.value}, categoryId=${category.id})}"class="skill-btn-primary">項目を追加する</a>
            </div>
    
            <div class="skill-table-card">
            <table class="skill-table">
            <thead>
            <tr>
                <th scope="col">項目名</th>
                <th scope="col">学習時間</th>
                <th scope="col" aria-hidden="true"></th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="record : ${learningRecords}"
                th:if="${record.categoryId == category.id}">
                <td th:text="${record.itemName}">項目名</td>
                <td>
                    <form th:id="'form-' + ${record.id}"
                          th:action="@{/skill/records/update}"
                          method="post">
                        <input type="hidden" name="recordId" th:value="${record.id}">
                        <input type="hidden" name="month" th:value="${selectedMonth.value}">
                        <input type="number"
                               name="learningTimeMinutes"
                               class="skill-time-input"
                               th:value="${record.learningTimeMinutes}"
                               min="0"
                               aria-label="学習時間（分）">
                    </form>
                </td>
                <td>
                    <button type="submit"
                            class="btn-outline-primary"
                            th:attr="form='form-' + ${record.id}">
                        学習時間を保存する
                    </button>
                </td>
            </tr>
            </tbody>
        </table>
        </div>
            <p class="skill-empty"
                th:if="${#lists.isEmpty(learningRecords.?[categoryId == __${category.id}__])}">
                登録されている項目はありません
            </p>
    </section>
    <a th:href="@{/top}" class="btn-primary" style="display: block; width: fit-content; margin-left: auto; margin-top: 24px;">TOPに戻る</a>
</main>
<div th:replace="~{fragments/layout :: siteFooter}"></div>
<div th:if="${updateCompleted}" id="modal-overlay">
    <div id="modal-box">
        <p>
            <span th:text="${updatedItemName} + 'の学習時間を'"></span><br>
            <span th:text="${updatedMinutes} + '分で更新しました！'"></span>
        </p>
        <a th:href="@{/skill/edit(month=${selectedMonth.value})}">
            <button type="button">編集ページに戻る</button>
        </a>
    </div>
</div>

<script th:inline="javascript">
    (function () {
        var select = document.getElementById('monthSelect');
        var baseUrl = /*[[@{/skill/edit}]]*/ '/skill/edit';
        select.addEventListener('change', function () {
            window.location.href = baseUrl + '?month=' + encodeURIComponent(select.value);
        });
    })();
</script>
</body>
</html>
